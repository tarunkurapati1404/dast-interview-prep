name: Full DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scans:
    name: GitLeaks -> Snyk -> Trivy -> ZAP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: GitLeaks Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Snyk to check for dependencies
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # --- NEW: BUILD DOCKER IMAGE ---
      - name: Build the Docker Image
        run: docker build -t my-flask-app:${{ github.sha }} .
      # -------------------------------

      # --- NEW: TRIVY CONTAINER SCAN ---
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-flask-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      # ---------------------------------

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ secrets.DAST_TARGET_URL }}
          
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: report_html.html
